name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A551C1: ${{ secrets.A551C1 }}
          B39EB8: ${{ secrets.B39EB8 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A551C1', '')
          bm = os.environ.get('B39EB8', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 3f3aba4f587fd491a4c99ce74b3279a7e5589106abfca5 -->', gm)
              s2 = s2.replace('<!-- db2bd8e99c85afaac3aba4bdd3259a71cd9f2c42fdcb -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
